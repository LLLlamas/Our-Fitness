# TestFlight ship workflow.
# Triggers: manual (workflow_dispatch) or a pushed tag matching `v*`.
# Does NOT run on every main push — iterate via compile.yml first.

name: TestFlight

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "Changelog text shown to TestFlight testers"
        required: false
        default: ""
      refresh_signing:
        description: "Allow match to create/refresh signing assets once. Leave off for normal releases."
        required: false
        type: boolean
        default: false
  push:
    tags: ["v*"]

concurrency:
  group: testflight
  cancel-in-progress: false   # never cancel an upload mid-flight

jobs:
  ship:
    name: Sign + Archive + Upload via Fastlane
    runs-on: macos-26
    timeout-minutes: 45

    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      MATCH_GIT_BRANCH: ${{ vars.MATCH_GIT_BRANCH }}
      MATCH_GIT_FULL_NAME: ${{ vars.MATCH_GIT_FULL_NAME }}
      MATCH_GIT_USER_EMAIL: ${{ vars.MATCH_GIT_USER_EMAIL }}
      MATCH_READONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_signing == true && 'false' || 'true' }}
      # Manually-generated App Store provisioning profile, base64-encoded.
      # Required because fastlane match can no longer attach managed capabilities
      # (HealthKit, Background Delivery, Push, Sign-in-with-Apple) to regenerated
      # profiles since Apple removed the underlying API in May 2025. The profile
      # is generated by hand at developer.apple.com → Profiles, then stored as a
      # repo secret so CI can install it before each build.
      APPSTORE_PROFILE_BASE64: ${{ secrets.APPSTORE_PROFILE_BASE64 }}
      CHANGELOG: ${{ github.event.inputs.changelog }}
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          for v in APPLE_TEAM_ID APP_STORE_CONNECT_API_KEY_ID APP_STORE_CONNECT_API_ISSUER_ID APP_STORE_CONNECT_API_KEY_P8 KEYCHAIN_PASSWORD MATCH_GIT_URL MATCH_PASSWORD MATCH_GIT_BASIC_AUTHORIZATION; do
            if [ -z "${!v:-}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required GitHub secrets: ${missing[*]}"
            echo "See README.md → 'GitHub secrets' for setup."
            exit 1
          fi

      - name: Preflight — signing mode + match repo readiness
        run: |
          # The App Store profile is always required, regardless of signing mode,
          # because fastlane match can no longer attach managed capabilities
          # (HealthKit, etc.) to regenerated profiles. Profile generation is
          # manual; storage is a repo secret.
          if [ -z "${APPSTORE_PROFILE_BASE64:-}" ]; then
            echo "::error::APPSTORE_PROFILE_BASE64 secret is not set. Generate the App Store provisioning profile manually in developer.apple.com → Profiles (with HealthKit + Background Delivery enabled), base64-encode the .mobileprovision file, and save it as a repo secret named APPSTORE_PROFILE_BASE64. See CLAUDE.md → TestFlight signing for full instructions."
            exit 1
          fi
          if [ "$MATCH_READONLY" = "false" ]; then
            echo "::warning title=Signing mode::REFRESH — match will rotate the Apple Distribution cert in $MATCH_GIT_URL. Only use for cert rotation; the provisioning profile is managed via APPSTORE_PROFILE_BASE64, not match."
            exit 0
          fi
          echo "::notice title=Signing mode::READONLY — match will sync the existing Apple Distribution cert from $MATCH_GIT_URL."
          auth="$(printf '%s' "$MATCH_GIT_BASIC_AUTHORIZATION" | base64 -d 2>/dev/null || true)"
          if [ -z "$auth" ]; then
            echo "::error::MATCH_GIT_BASIC_AUTHORIZATION is not valid base64. Re-create it from 'github-user:token' and re-save the secret."
            exit 1
          fi
          tmp="$(mktemp -d)"
          if ! git -c http.extraHeader="Authorization: Basic $MATCH_GIT_BASIC_AUTHORIZATION" clone --depth=1 --quiet "$MATCH_GIT_URL" "$tmp"; then
            echo "::error::Failed to clone match repo at $MATCH_GIT_URL. Check the URL has no leading/trailing spaces and the PAT in MATCH_GIT_BASIC_AUTHORIZATION can read the repo."
            exit 1
          fi
          if ! ls "$tmp/certs/distribution/"*.p12 >/dev/null 2>&1; then
            echo "::error::Match repo $MATCH_GIT_URL has no Apple Distribution cert yet — it has never been bootstrapped. Re-run this workflow with 'refresh_signing' checked to seed the cert + provisioning profile."
            exit 1
          fi

      # See compile.yml for why this is dynamic: runner image installs
      # Xcode as Xcode_26.0.1.app etc., keeps betas alongside, and
      # xcode-select alone isn't enough because PATH can route to beta.
      - name: Select Xcode 26
        run: |
          set -euo pipefail
          for beta in /Applications/Xcode_*beta*.app; do
            [ -e "$beta" ] || continue
            sudo mv "$beta" "$(dirname "$beta")/_disabled_$(basename "$beta")"
          done
          shopt -s nullglob
          ALL=( /Applications/Xcode_26*.app )
          shopt -u nullglob
          VALID=()
          for x in "${ALL[@]}"; do
            [ -d "$x/Contents/Developer" ] && VALID+=( "$x" )
          done
          if [ ${#VALID[@]} -eq 0 ]; then
            echo "::error::No stable Xcode 26.x found in /Applications"
            exit 1
          fi
          XCODE_APP=$(printf '%s\n' "${VALID[@]}" | sort -V | tail -1)
          echo "Selecting $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"
          echo "PATH=$XCODE_APP/Contents/Developer/usr/bin:$PATH" >> "$GITHUB_ENV"

      - name: Ensure iOS simulator runtime
        run: |
          set -euo pipefail
          sudo xcodebuild -runFirstLaunch
          for attempt in 1 2 3; do
            if xcodebuild -downloadPlatform iOS; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 30))
              echo "::warning::-downloadPlatform iOS attempt $attempt failed; retrying"
            fi
          done
          echo "::error::iOS simulator runtime download failed after 3 attempts"
          xcrun simctl runtime list || true
          exit 1

      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Refresh signing assets in match
        if: env.MATCH_READONLY == 'false'
        run: bundle exec fastlane ios sync_signing

      # Install the manually-generated App Store provisioning profile.
      # Must happen BEFORE the build step so Xcode's profile index picks it up.
      - name: Install App Store provisioning profile (manual, capability-bearing)
        run: bundle exec fastlane ios install_appstore_profile

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate placeholder AppIcon (skipped if a real icon exists)
        run: bash scripts/generate-icon.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Validate CI invariants
        run: bash scripts/validate-ci-invariants.sh

      # Tests first — never ship a red build.
      - name: Run tests
        run: bundle exec fastlane ios tests

      - name: Ship to TestFlight
        run: bundle exec fastlane ios beta

      # Diagnostic: dump the entitlements that actually got signed into the IPA.
      # Compare this against the .entitlements file to confirm signing didn't
      # silently strip a capability (which happens when the provisioning
      # profile doesn't include it). Cheap to keep on permanently — one second.
      - name: Dump signed IPA entitlements
        if: always()
        run: |
          set +e
          ipa="$(ls build/ipa/*.ipa 2>/dev/null | head -1)"
          if [ -z "$ipa" ]; then
            echo "::warning::No IPA found at build/ipa/*.ipa — skipping entitlement dump."
            exit 0
          fi
          tmp="$(mktemp -d)"
          unzip -q "$ipa" -d "$tmp"
          app="$(ls -d "$tmp"/Payload/*.app 2>/dev/null | head -1)"
          if [ -z "$app" ]; then
            echo "::warning::No .app bundle inside IPA — skipping."
            exit 0
          fi
          echo "::group::codesign entitlements for $(basename "$app")"
          codesign -d --entitlements - --xml "$app" 2>/dev/null \
            | xmllint --format - 2>/dev/null \
            || codesign -d --entitlements - "$app"
          echo "::endgroup::"
          if codesign -d --entitlements - "$app" 2>/dev/null | grep -q "com.apple.developer.healthkit</key>"; then
            echo "::notice title=HealthKit::HealthKit entitlement IS present in the signed IPA."
          else
            echo "::error title=HealthKit::HealthKit entitlement is MISSING from the signed IPA. The provisioning profile likely doesn't include it. Regenerate the profile at developer.apple.com (delete + recreate, don't Edit) and update APPSTORE_PROFILE_BASE64."
          fi

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OurFitness-${{ github.run_number }}.ipa
          path: build/ipa/*.ipa
          retention-days: 30
