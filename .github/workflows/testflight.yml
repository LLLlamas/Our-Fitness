# TestFlight ship workflow.
# Triggers: manual (workflow_dispatch) or a pushed tag matching `v*`.
# Does NOT run on every main push — iterate via compile.yml first.

name: TestFlight

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "Changelog text shown to TestFlight testers"
        required: false
        default: ""
      refresh_signing:
        description: "Allow match to create/refresh signing assets once. Leave off for normal releases."
        required: false
        type: boolean
        default: false
  push:
    tags: ["v*"]

concurrency:
  group: testflight
  cancel-in-progress: false   # never cancel an upload mid-flight

jobs:
  ship:
    name: Sign + Archive + Upload via Fastlane
    runs-on: macos-26
    timeout-minutes: 45

    env:
      XCODE_VERSION: "26.0"
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      MATCH_GIT_BRANCH: ${{ vars.MATCH_GIT_BRANCH }}
      MATCH_GIT_FULL_NAME: ${{ vars.MATCH_GIT_FULL_NAME }}
      MATCH_GIT_USER_EMAIL: ${{ vars.MATCH_GIT_USER_EMAIL }}
      MATCH_READONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_signing == true && 'false' || 'true' }}
      CHANGELOG: ${{ github.event.inputs.changelog }}
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          for v in APPLE_TEAM_ID APP_STORE_CONNECT_API_KEY_ID APP_STORE_CONNECT_API_ISSUER_ID APP_STORE_CONNECT_API_KEY_P8 KEYCHAIN_PASSWORD MATCH_GIT_URL MATCH_PASSWORD MATCH_GIT_BASIC_AUTHORIZATION; do
            if [ -z "${!v:-}" ]; then missing+=("$v"); fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required GitHub secrets: ${missing[*]}"
            echo "See README.md → 'GitHub secrets' for setup."
            exit 1
          fi

      - name: Preflight — signing mode + match repo readiness
        run: |
          if [ "$MATCH_READONLY" = "false" ]; then
            echo "::warning title=Signing mode::REFRESH — match will create/rotate signing assets and push to $MATCH_GIT_URL. Only use for bootstrap or intentional rotation."
            exit 0
          fi
          echo "::notice title=Signing mode::READONLY — match will sync existing signing assets from $MATCH_GIT_URL."
          auth="$(printf '%s' "$MATCH_GIT_BASIC_AUTHORIZATION" | base64 -d 2>/dev/null || true)"
          if [ -z "$auth" ]; then
            echo "::error::MATCH_GIT_BASIC_AUTHORIZATION is not valid base64. Re-create it from 'github-user:token' and re-save the secret."
            exit 1
          fi
          tmp="$(mktemp -d)"
          if ! git -c http.extraHeader="Authorization: Basic $MATCH_GIT_BASIC_AUTHORIZATION" clone --depth=1 --quiet "$MATCH_GIT_URL" "$tmp"; then
            echo "::error::Failed to clone match repo at $MATCH_GIT_URL. Check the URL has no leading/trailing spaces and the PAT in MATCH_GIT_BASIC_AUTHORIZATION can read the repo."
            exit 1
          fi
          if ! ls "$tmp/certs/distribution/"*.p12 >/dev/null 2>&1; then
            echo "::error::Match repo $MATCH_GIT_URL has no Apple Distribution cert yet — it has never been bootstrapped. Re-run this workflow with 'refresh_signing' checked to seed the cert + provisioning profile."
            exit 1
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Refresh signing assets in match
        if: env.MATCH_READONLY == 'false'
        run: bundle exec fastlane ios sync_signing

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate placeholder AppIcon (skipped if a real icon exists)
        run: bash scripts/generate-icon.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Validate CI invariants
        run: bash scripts/validate-ci-invariants.sh

      # Tests first — never ship a red build.
      - name: Run tests
        run: bundle exec fastlane ios tests

      - name: Ship to TestFlight
        run: bundle exec fastlane ios beta

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: OurFitness-${{ github.run_number }}.ipa
          path: build/ipa/*.ipa
          retention-days: 30
