# Fast feedback workflow. Runs on every push + PR.
# Generates the Xcode project, compiles, runs unit tests. NO signing.
# Use this loop to flush Swift errors before triggering TestFlight.

name: Compile + Test

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:

concurrency:
  group: compile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: xcodegen + build + test (no signing)
    runs-on: macos-26
    timeout-minutes: 25

    env:
      SCHEME: OurFitness
      PROJECT: OurFitness.xcodeproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # actions/runner-images installs Xcode as point-release names
      # (Xcode_26.0.1.app, never bare Xcode_26.app) and keeps the latest
      # beta installed alongside the stable. Disable betas physically so
      # they can't be picked up via PATH/SDK lookup, then select the
      # highest stable Xcode 26.x.
      - name: Select Xcode 26
        run: |
          set -euo pipefail
          for beta in /Applications/Xcode_*beta*.app; do
            [ -e "$beta" ] || continue
            sudo mv "$beta" "$(dirname "$beta")/_disabled_$(basename "$beta")"
          done
          shopt -s nullglob
          ALL=( /Applications/Xcode_26*.app )
          shopt -u nullglob
          VALID=()
          for x in "${ALL[@]}"; do
            [ -d "$x/Contents/Developer" ] && VALID+=( "$x" )
          done
          if [ ${#VALID[@]} -eq 0 ]; then
            echo "::error::No stable Xcode 26.x found in /Applications"
            exit 1
          fi
          XCODE_APP=$(printf '%s\n' "${VALID[@]}" | sort -V | tail -1)
          echo "Selecting $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"
          echo "PATH=$XCODE_APP/Contents/Developer/usr/bin:$PATH" >> "$GITHUB_ENV"

      - name: Ensure iOS simulator runtime
        run: |
          set -euo pipefail
          # runFirstLaunch must run before -downloadPlatform; without it
          # the simulator catalog isn't initialized and -downloadPlatform
          # exits 70 with "not available for download".
          sudo xcodebuild -runFirstLaunch
          for attempt in 1 2 3; do
            if xcodebuild -downloadPlatform iOS; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 30))
              echo "::warning::-downloadPlatform iOS attempt $attempt failed; retrying"
            fi
          done
          echo "::error::iOS simulator runtime download failed after 3 attempts"
          xcrun simctl runtime list || true
          exit 1

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate placeholder AppIcon (skipped if a real icon exists)
        run: bash scripts/generate-icon.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Validate domain test boundaries
        run: bash scripts/validate-ci-invariants.sh

      - name: Build (Debug, no signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT=YES \
            build \
            | xcbeautify --renderer github-actions

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath build/TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT=YES \
            | xcbeautify --renderer github-actions

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults-${{ github.run_id }}
          path: build/TestResults.xcresult
          retention-days: 7
