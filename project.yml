# XcodeGen project definition.
# CI: generated by .github/workflows on every run (the .xcodeproj is gitignored).
# Manual: not applicable on Windows — iterate via GitHub Actions.

name: OurFitness
options:
  bundleIdPrefix: com.ourfitness
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    # Strict concurrency = minimal during scaffolding. Bump to "complete" once the
    # surface area is stable and the Sendable churn is worth fixing.
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "NO"

targets:
  OurFitness:
    type: application
    platform: iOS
    sources:
      - path: OurFitness
        excludes:
          - "**/.DS_Store"
    resources:
      - path: OurFitness/Assets.xcassets
    info:
      path: OurFitness/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ourfitness.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: OurFitness/Info.plist
        CODE_SIGN_ENTITLEMENTS: OurFitness/OurFitness.entitlements
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Manual signing — fastlane injects the right cert + profile in CI.
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "OurFitness AppStore"
      configs:
        Debug:
          # Debug builds in the compile workflow run with CODE_SIGNING_ALLOWED=NO,
          # so leave these blank for Debug to avoid warnings in PR builds.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
    entitlements:
      path: OurFitness/OurFitness.entitlements

  OurFitnessTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OurFitnessTests
    dependencies:
      - target: OurFitness
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ourfitness.app.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OurFitness.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/OurFitness"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"

schemes:
  OurFitness:
    build:
      targets:
        OurFitness: all
        OurFitnessTests: [test]
    test:
      gatherCoverageData: true
      coverageTargets:
        - OurFitness
      targets:
        - OurFitnessTests
    run:
      config: Debug
    archive:
      config: Release
