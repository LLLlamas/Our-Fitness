# XcodeGen project definition.
# CI: generated by .github/workflows on every run (the .xcodeproj is gitignored).
# Manual: not applicable on Windows — iterate via GitHub Actions.

name: OurFitness
options:
  bundleIdPrefix: com.ourfitness
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  # objectVersion cap removed when upgrading to Xcode 26 (macos-26 runner).
  # XcodeGen will emit the project format native to the installed Xcode.
  # Re-add a floor if you need to support a specific older Xcode version again.

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    # Strict concurrency = minimal during scaffolding. Bump to "complete" once the
    # surface area is stable and the Sendable churn is worth fixing.
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "NO"

targets:
  OurFitness:
    type: application
    platform: iOS
    sources:
      - path: OurFitness
        excludes:
          - "**/.DS_Store"
          # Bundled as a resource below, not a compile source.
          - "Resources/usda-foods.json"
    resources:
      - path: OurFitness/Assets.xcassets
      # Offline USDA FoodData Central seed/dataset, bundled into the app only
      # (NOT the hostless test target — FoodDatabase degrades to empty there).
      # Regenerated by scripts/build-food-db.py on a Mac/CI with network.
      - path: OurFitness/Resources/usda-foods.json
    # No `info:` block — that would make XcodeGen regenerate Info.plist
    # on every `xcodegen generate`, wiping the orientations, HealthKit
    # usage strings, and UILaunchScreen we keep in the file. Xcode finds
    # the file via the INFOPLIST_FILE build setting below.
    #
    # Same rule for `entitlements:` — DO NOT add an `entitlements:` block
    # here. XcodeGen will write an empty plist to the path on every
    # `xcodegen generate`, clobbering our HealthKit / Background Delivery
    # entitlements. The archive will sign with only the 4 default keys
    # (application-identifier, beta-reports-active, team-identifier,
    # get-task-allow) and HealthKit silently drops out of the IPA — even
    # if the provisioning profile has HealthKit attached correctly.
    # CODE_SIGN_ENTITLEMENTS below points Xcode at the hand-written file.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ourfitness.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: OurFitness/Info.plist
        CODE_SIGN_ENTITLEMENTS: OurFitness/OurFitness.entitlements
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # iPhone/iPad only. Opt out of automatic "Designed for iPhone/iPad"
        # availability on Mac (Apple Silicon) and visionOS — HealthKit doesn't
        # exist on those platforms, and we don't want to ship there. Together
        # with omitting "healthkit" from UIRequiredDeviceCapabilities in
        # Info.plist, this clears ITMS-90863 + ITMS-90984.
        SUPPORTS_MACCATALYST: "NO"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        # Manual signing — fastlane injects the right cert + profile in CI.
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: "$(APPLE_TEAM_ID)"
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "OurFitness AppStore"
      configs:
        Debug:
          # Debug builds in the compile workflow run with CODE_SIGNING_ALLOWED=NO,
          # so leave these blank for Debug to avoid warnings in PR builds.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"

  OurFitnessTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OurFitnessTests
      - path: OurFitness/Domain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ourfitness.app.tests
        # Domain tests compile the pure OurFitness/Domain sources directly.
        # Keep them hostless so XCTest never launches the SwiftUI app lifecycle,
        # and never link through the app executable/debug dylib.
        TEST_HOST: ""
        BUNDLE_LOADER: ""
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"

schemes:
  OurFitness:
    build:
      targets:
        OurFitness: all
        OurFitnessTests: [test]
    test:
      gatherCoverageData: true
      coverageTargets:
        - OurFitness
      targets:
        - OurFitnessTests
    run:
      config: Debug
    archive:
      config: Release
